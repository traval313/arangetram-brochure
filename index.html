<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tithi & Rushika Arangetram Brochure</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      background: #061414;
    }

    body {
      background: #061414;
      font-family: Georgia, serif;
      color: #f7d77b;
    }

    .brochure {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      background: #061414;
    }

    .section {
      width: 100%;
      display: block;
      margin: 0;
      padding: 0;
    }

    .section img {
      width: 100%;
      height: auto;
      display: block;
      user-select: auto;
      -webkit-user-select: auto;
      -webkit-touch-callout: default;
    }

    .quick-download {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      justify-content: center;
      padding: 12px 16px;
      background: rgba(6, 20, 20, 0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .quick-download a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 10px 20px;
      border: 1px solid #f7d77b;
      border-radius: 6px;
      background: #f7d77b;
      color: #061414;
      font-family: Georgia, serif;
      font-size: 15px;
      font-weight: bold;
      line-height: 1;
      text-decoration: none;
    }

    .quick-download a:focus-visible {
      outline: 3px solid #ffffff;
      outline-offset: 3px;
    }

    .download-area {
      text-align: center;
      padding: 28px 18px 36px;
      font-size: 14px;
      line-height: 1.6;
      color: #e8c96d;
      background: #061414;
    }

    .download-area a {
      color: #f7d77b;
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <main class="brochure">

    <div class="quick-download">
      <a href="x.pdf" download>
        Quick Download
      </a>
    </div>

    <!-- 1. Cover -->
    <section class="section">
      <img 
        src="images/cover.webp" 
        alt="Tithi and Rushika Raval Bharatanatyam Arangetram Cover"
        fetchpriority="high"
      />
    </section>

    <!-- 2. Program 1 -->
    <section class="section">
      <img 
        src="images/program-1.webp" 
        alt="Arangetram Program Part 1"
      />
    </section>

    <!-- 3. Program 2 -->
    <section class="section">
      <img 
        src="images/program-2.webp" 
        alt="Arangetram Program Part 2"
      />
    </section>

    <!-- 4. Program 3 -->
    <section class="section">
      <img 
        src="images/program-3.webp" 
        alt="Arangetram Program Part 3"
      />
    </section>

    <!-- 5. Artists 1 -->
    <section class="section">
      <img 
        src="images/artists-1.webp" 
        alt="Arangetram Artists Part 1"
        loading="lazy"
      />
    </section>

    <!-- 6. Artists 2 -->
    <section class="section">
      <img 
        src="images/artists-2.webp" 
        alt="Arangetram Artists Part 2"
        loading="lazy"
      />
    </section>

    <!-- Optional full brochure download -->
    <div class="download-area">
      Long press any image to save it to Photos.<br />
      <br />
      <a href="x.pdf" download>
        Download PDF version
      </a>
    </div>

  </main>
</body>
</html>
